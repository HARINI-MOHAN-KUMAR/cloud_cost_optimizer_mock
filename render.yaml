services:
  - type: web
    name: cloud-iq
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: true
      - key: DISCORD_WEBHOOK_URL
        sync: true
      - key: ENABLE_DISCORD_ALERTS
        value: "true"
      - key: EMAIL_SENDER
        sync: true
      - key: EMAIL_PASSWORD
        sync: true
      - key: EMAIL_RECEIVER
        sync: true
      - key: ENABLE_EMAIL_REPORT
        value: "true"
      - key: BUDGET_THRESHOLD
        value: "1500"
