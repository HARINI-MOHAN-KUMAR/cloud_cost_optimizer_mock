services:
  - type: web
    name: cloud-iq
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: "HARINI-MOHAN-KUMAR/cloud_cost_optimizer_mock"
      - key: ENABLE_GITHUB_ISSUES
        value: "true"
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ENABLE_DISCORD_ALERTS
        value: "true"
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_RECEIVER
        sync: false
      - key: SMTP_SERVER
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: ENABLE_EMAIL_REPORT
        value: "true"
      - key: BUDGET_THRESHOLD
        value: "1500"
